<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Memories</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
    font-size: 20px;
    background: #0d0d0d;
    color: #fff;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow-x: hidden;
    min-height: 100vh;
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
        }

        .screen {
            display: none;
            min-height: 100vh;
            padding: 20px;
            animation: fadeIn 1s ease-in;
        }
        .active { display: flex!important; flex-direction: column; justify-content: center; align-items: center; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        button {
            background: linear-gradient(135deg, #e91e63, #ffffff, #e91e63);
            color: #000;
            border: 2px solid #e91e63;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 15px #e91e63;
            transition: 0.3s;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
        button:hover { transform: scale(1.05); }

        #welcome h1 {
            font-size: 3.8rem;
            background: linear-gradient(135deg, #ffffff, #ffb3c6, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 15px rgba(255, 179, 198, 0.5);
            margin-bottom: 25px;
            animation: fadeIn 2s ease-in;
        }

        #welcome h1 .emoji {
            -webkit-text-fill-color: initial!important;
            background: none!important;
            color: initial!important;
        }

        .dial-container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: none;
            width: 90%;
            max-width: 350px;
        }
        #pinDisplay {
            background: #333;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 15px;
            border-radius: 10px;
            font-size: 28px;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        .dial-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .dial-btn {
            background: #333;
            background: linear-gradient(135deg, #ffffff, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            border: 2px solid #ff69b4;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: none;
        }
        .dial-btn:active {
            background: #ff69b4;
            -webkit-text-fill-color: #000;
            color: black;
        }
        #error { color: #ff4444; margin-top: 15px; display: none; }

        .loading-text { font-size: 24px; color: #ff69b4; margin-bottom: 20px; }
        .loading-bar { width: 80%; max-width: 400px; background: #333; height: 12px; border-radius: 6px; }
        .progress { width: 0%; background: #ff69b4; height: 100%; border-radius: 6px; animation: load 2.5s forwards; }
        @keyframes load { to { width: 100%; } }

        #gallery-screen { padding: 20px; justify-content: flex-start; padding-top: 40px; }
        #gallery-screen h2 {
            background: linear-gradient(135deg, #ffffff, #ff8fab, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.2rem;
            margin: 0 0 20px;
            text-shadow: 0 0 15px rgba(255, 143, 171, 0.4);
        }
        #gallery-screen h2 .emoji {
            -webkit-text-fill-color: initial!important;
            background: none!important;
            color: initial!important;
            text-shadow: none!important;
        }
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 0 auto 20px;
        }
        .card {
            background: #1a1a1a;
            border: 2px solid transparent;
            background-image: linear-gradient(#1a1a1a, #1a1a1a), linear-gradient(135deg, #ffffff, #ff69b4, #ffffff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.6);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s ease-in-out;
        }
        .card img { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; }
        .card.show { opacity: 1; transform: scale(1); }
        #nextBtn { display: none; margin: 10px auto 30px; }

        #hearts-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 6s infinite ease-in;
            opacity: 0;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        #messageBox {
            background: rgba(26, 26, 26, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px #ff69b4;
            max-width: 90%;
            width: 500px;
            z-index: 10;
        }
        #typedMessage {
    font-size: 20px;
    color: #ff69b4;
    text-align: left;
    min-height: 50px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-wrap: break-word;
        }
        .typing::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        #heartBtnContainer {
            display: none;
            margin-top: 30px;
        }
        #heartBtn {
            background: none;
            border: none;
            font-size: 60px;
            cursor: pointer;
            animation: spin 2s linear infinite;
            filter: drop-shadow(0 0 10px #ff1744);
            padding: 0;
            box-shadow: none;
        }
        #heartBtn:hover {
            transform: scale(1.2);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        #heartBtnText {
            color: #ff69b4;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        #final-screen h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffffff, #ff69b4, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
            animation: fadeIn 2s ease-in;
            margin-bottom: 20px;
        }
        #timeInfo {
            font-size: 14px;
            color: #ff69b4;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        #smallText {
            font-size: 12px;
            color: #ff69b4;
            margin-top: 10px;
            opacity: 0.8;
        }

        #musicBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicBtn" onclick="toggleMusic()">🔊</button>

    <div id="welcome" class="screen active">
        <h1>Welcome <span class="emoji">✨</span></h1>
        <button onclick="showScreen('dial-screen')">Click Here</button>
    </div>

    <div id="dial-screen" class="screen">
        <div class="dial-container">
            <h2 style="color: #ff69b4; margin-bottom: 20px;">🔒 Secret Code</h2>
            <input type="password" id="pinDisplay" placeholder="____" maxlength="4" readonly>
            <div class="dial-pad">
                <button class="dial-btn" onclick="addDigit('1')">1</button>
                <button class="dial-btn" onclick="addDigit('2')">2</button>
                <button class="dial-btn" onclick="addDigit('3')">3</button>
                <button class="dial-btn" onclick="addDigit('4')">4</button>
                <button class="dial-btn" onclick="addDigit('5')">5</button>
                <button class="dial-btn" onclick="addDigit('6')">6</button>
                <button class="dial-btn" onclick="addDigit('7')">7</button>
                <button class="dial-btn" onclick="addDigit('8')">8</button>
                <button class="dial-btn" onclick="addDigit('9')">9</button>
                <button class="dial-btn" onclick="clearPin()">C</button>
                <button class="dial-btn" onclick="addDigit('0')">0</button>
                <button class="dial-btn" onclick="checkCode()">✓</button>
            </div>
            <p id="error">Ghalat Code! Dobara koshish karein.</p>
        </div>
    </div>

    <div id="loading-memories" class="screen">
        <div class="loading-text">Loading Memories...</div>
        <div class="loading-bar"><div class="progress"></div></div>
    </div>

    <div id="gallery-screen" class="screen">
        <h2>Most Beautiful Person in the World <span class="emoji">🌎</span><span class="emoji">✨</span></h2>
        <div class="gallery-container" id="gallery-content"></div>
        <button id="nextBtn" onclick="showScreen('loading-message')">Next</button>
    </div>

    <div id="loading-message" class="screen">
        <div class="loading-text">Loading Message...</div>
        <div class="loading-bar"><div class="progress"></div></div>
    </div>
        <div id="message-screen" class="screen">
        <div id="hearts-bg"></div>
        <div id="messageBox">
            <div id="typedMessage"></div>
            <div id="heartBtnContainer">
                <button id="heartBtn" onclick="showScreen('final-screen')">❤️</button>
                <div id="heartBtnText">Press the Heart</div>
            </div>
        </div>
    </div>

    <div id="final-screen" class="screen">
        <h1>Time Spend With You</h1>
        <div id="timeInfo"></div>
        <button onclick="restartSite()" style="margin-top: 20px;">Click for Restart</button>
        <div id="smallText">Just for you 💖</div>
    </div>

    <script>
        let currentPin = '';
        const correctCode = '1806';
        let startTime = new Date();
        let musicPlaying = false;

        const items = [
            { img: "pic3.jpg" },
            { img: "pic2.jpg" },
            { img: "pic1.jpg" },
            { img: "pic4.jpg" },
            { img: "pic5.jpg" },
            { img: "pic6.jpg" },
            { img: "pic7.jpg" },
            { img: "pic8.jpg" }
        ];

        const finalMessage = `You are My Favorite Person ♥️. I love you more than your thoughts.No matter what, you will always be my favorite person 🔒❤️.
تیرے خیال سے غافل کبھی نہیں ہونا
یہ میرا عشق ہے، کوئی کھیل نہیں
I am deeply in love with a version of you that only exists in my silent prayers. 🛐🕊️🤫❤️ I look at you the way people look at stars—beautiful, but untouchable.✨🌌👁️❤️
مصور عالم کی بنائی گئی تمام تر تخلیقات میں سے میرے دل نے جس کو محبت کیلئے چنا! وہ فقط " آپ " ہیں۔
A thousand times over, you will always hold a special place in my heart 🥺🌹 Sometimes I just want to tell you everything, but then I remember you don't care.🥀🖤💬
حاصلِ کن فکاں ہے قلب میرا
تم مری جان، اس میں رہتے ہو
It hurts to know I’m just a minor character in your story. 📖💔👥`;

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            if (musicPlaying) {
                music.pause();
                btn.innerHTML = '🔇';
                musicPlaying = false;
            } else {
                music.play();
                btn.innerHTML = '🔊';
                musicPlaying = true;
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            if (id === 'dial-screen' &&!musicPlaying) {
                document.getElementById('bgMusic').play().catch(e => console.log('Music autoplay blocked'));
                document.getElementById('musicBtn').innerHTML = '🔊';
                musicPlaying = true;
            }

            if (id === 'loading-memories') {
                setTimeout(() => {
                    showScreen('gallery-screen');
                    buildGallery();
                }, 2500);
            }
            if (id === 'loading-message') {
                setTimeout(() => {
                    showScreen('message-screen');
                    startHeartsAndMessage();
                }, 2500);
            }
            if (id === 'final-screen') {
                showTimeInfo();
            }
        }

        function addDigit(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                document.getElementById('pinDisplay').value = currentPin;
                document.getElementById('error').style.display = 'none';
            }
        }

        function clearPin() {
            currentPin = '';
            document.getElementById('pinDisplay').value = '';
        }

        function checkCode() {
            if (currentPin === correctCode) {
                startTime = new Date();
                showScreen('loading-memories');
            } else {
                document.getElementById('error').style.display = 'block';
                clearPin();
            }
        }

        function typeWriter(element, text, speed = 40, callback) {
            let i = 0;
            element.classList.add('typing');
            element.innerHTML = '';
            
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    // Auto scroll jab text badhe
                    element.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    setTimeout(typing, speed);
                } else {
                    element.classList.remove('typing');
                    if (callback) callback();
                }
            }
            typing();
        }

        function buildGallery() {
            let container = document.getElementById('gallery-content');
            container.innerHTML = '';

            items.forEach((item, index) => {
                let cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `<img src="${item.img}" alt="Photo">`;

                container.appendChild(cardDiv);

                setTimeout(() => {
                    cardDiv.classList.add('show');

                    setTimeout(() => {
                        cardDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);

                    if (index === items.length - 1) {
                        setTimeout(() => {
                            document.getElementById('nextBtn').style.display = 'block';
                            document.getElementById('nextBtn').scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 500);
                    }
                }, index * 800);
            });
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '♥';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 15 + 20) + 'px';

            const colors = ['#ff1744', '#ff69b4', '#ff4081', '#e91e63', '#ff5252', '#9c27b0', '#673ab7', '#ff00ff', '#00bcd4', '#ffc107'];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];

            document.getElementById('hearts-bg').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function startHeartsAndMessage() {
            const heartInterval = setInterval(createHeart, 150);

            setTimeout(() => {
                typeWriter(document.getElementById('typedMessage'), finalMessage, 35, () => {
                    document.getElementById('heartBtnContainer').style.display = 'block';
                    document.getElementById('heartBtnContainer').scrollIntoView({ behavior: 'smooth', block: 'center' });
                });
            }, 500);
        }

        function showTimeInfo() {
            let endTime = new Date();
            let diffMs = endTime - startTime;
            let diffMins = Math.floor(diffMs / 60000);
            let diffSecs = Math.floor((diffMs % 60000) / 1000);

            let openTime = startTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            let currentTime = endTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            document.getElementById('timeInfo').innerHTML = `
                You opened this web at ${openTime} ⏰<br>
                Current time is ${currentTime} 🕐<br>
                You spent ${diffMins} minutes ${diffSecs} seconds here 💝<br><br>
                Thanks for giving me your precious time 🥺💖✨
            `;
        }

        function restartSite() {
            currentPin = '';
            document.getElementById('pinDisplay').value = '';
            showScreen('welcome');
        }
    </script>

</body>
        </html>
